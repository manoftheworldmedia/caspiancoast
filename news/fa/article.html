<style>
  :root{
    --ink:#1b1916;--ink-soft:#4a463f;--cream:#f1ede4;--cream-2:#e9e3d6;--paper:#f7f4ec;
    --sage:#9fbf8f;--sage-deep:#7ea06d;--clay:#c06b3e;--gold:#d99a2b;
    --line:rgba(27,25,22,.16);--maxw:1280px;
    --font-serif:'Cinzel',serif;--font-display:'Archivo',sans-serif;--font-body:'Jost',sans-serif;
  }
  *{box-sizing:border-box;}
  html{scroll-behavior:smooth;}
  body{margin:0;background:var(--cream);color:var(--ink);font-family:'Vazirmatn',var(--font-body);font-size:17px;line-height:1.7;-webkit-font-smoothing:antialiased;}
  img{display:block;max-width:100%;}
  a{color:inherit;text-decoration:none;}
  h1,h2,h3{margin:0;font-family:'Vazirmatn',var(--font-display);font-weight:800;letter-spacing:0;line-height:1.05;}
  p{margin:0;}
  .wrap{max-width:var(--maxw);margin:0 auto;padding:0 32px;}
  .eyebrow{font-family:'Vazirmatn',var(--font-display);letter-spacing:.04em;font-size:12px;font-weight:600;color:var(--ink-soft);}

  /* nav (cloned from site) */
  header.nav{position:fixed;top:34px;left:0;right:0;z-index:60;display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:20px 38px;transition:background .4s,padding .4s,box-shadow .4s,color .4s;color:#fff;}
  header.nav.solid{background:var(--cream);color:var(--ink);box-shadow:0 1px 0 var(--line);padding:14px 38px;}
  .nav-left,.nav-right{display:flex;gap:30px;align-items:center;}
  .nav-right{justify-content:flex-end;}
  .nav-link{font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:13px;font-weight:600;opacity:.92;position:relative;padding:4px 0;}
  .nav-link::after{content:"";position:absolute;left:0;right:100%;bottom:0;height:1.5px;background:currentColor;transition:right .3s ease;}
  .nav-link:hover::after{right:0;}
  .brand{display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1;}
  .brand .name{font-family:'Vazirmatn',var(--font-serif);font-weight:600;letter-spacing:.02em;font-size:18px;}
  .brand .sub{font-family:'Vazirmatn',var(--font-display);letter-spacing:.04em;font-size:10px;font-weight:600;opacity:.8;}
  .util-bar{position:fixed;top:0;left:0;right:0;z-index:61;display:flex;justify-content:space-between;align-items:center;padding:9px clamp(20px,4vw,38px);color:#fff;transition:background .4s,color .4s,box-shadow .4s;}
  .util-bar.solid{background:var(--cream);color:var(--ink);box-shadow:0 1px 0 var(--line);}
  .util-status{display:flex;align-items:center;gap:9px;white-space:nowrap;font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:11px;font-weight:700;}
  .util-status .dot{width:9px;height:9px;border-radius:50%;background:#9aa0a6;flex:0 0 auto;}
  .util-status.open{color:#2f9e54;}
  .util-status.open .dot{background:#3fb663;animation:opendot 2.4s ease-out infinite;}
  .util-status.closed{color:#d23f33;}
  .util-status.closed .dot{background:#d8453a;}
  @keyframes opendot{0%{box-shadow:0 0 0 0 rgba(63,182,99,.55);}70%{box-shadow:0 0 0 8px rgba(63,182,99,0);}100%{box-shadow:0 0 0 0 rgba(63,182,99,0);}}
  .lang-toggle{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-size:11px;font-weight:600;letter-spacing:.12em;direction:ltr;}
  .lang-toggle button{font:inherit;background:none;border:0;color:inherit;cursor:pointer;opacity:.5;padding:2px 0;text-transform:uppercase;transition:opacity .2s;}
  .lang-toggle button.active{opacity:1;}
  .lang-toggle button.fa{font-family:'Vazirmatn',var(--font-body);letter-spacing:0;}
  .lang-toggle .sep{opacity:.4;}
  .util-right{display:flex;align-items:center;gap:15px;}
  .util-soc{display:flex;align-items:center;opacity:.92;transition:opacity .2s;}
  .util-soc:hover{opacity:1;}
  .util-soc svg{width:17px;height:17px;display:block;}
  .nav-toggle{display:none;background:none;border:0;cursor:pointer;width:30px;height:22px;position:relative;padding:0;color:inherit;}
  .nav-toggle span{position:absolute;left:0;right:0;height:2px;background:currentColor;border-radius:2px;transition:transform .3s ease, opacity .25s ease, top .3s ease;}
  .nav-toggle span:nth-child(1){top:2px;}
  .nav-toggle span:nth-child(2){top:10px;}
  .nav-toggle span:nth-child(3){top:18px;}
  body.menu-open .nav-toggle span:nth-child(1){top:10px;transform:rotate(45deg);}
  body.menu-open .nav-toggle span:nth-child(2){opacity:0;}
  body.menu-open .nav-toggle span:nth-child(3){top:10px;transform:rotate(-45deg);}
  .mobile-menu{position:fixed;inset:0;z-index:70;background:var(--cream);display:flex;flex-direction:column;justify-content:center;align-items:flex-end;gap:2px;padding:96px clamp(24px,8vw,48px) 48px;opacity:0;visibility:hidden;transform:translateY(-8px);transition:opacity .35s ease, visibility .35s ease, transform .35s ease;}
  body.menu-open .mobile-menu{opacity:1;visibility:visible;transform:none;}
  .mobile-menu .mm-eye{position:absolute;left:clamp(24px,8vw,48px);top:30px;width:42px;opacity:.9;}
  .mobile-menu a{font-family:'Vazirmatn',var(--font-display);letter-spacing:0;font-size:clamp(30px,9vw,46px);font-weight:800;color:var(--ink);line-height:1.3;padding:6px 0;}
  .mobile-menu a:active{color:var(--clay);}
  .mobile-menu .mm-order{margin-top:30px;background:var(--clay);color:#fff;font-size:15px;font-weight:700;padding:18px 40px;border-radius:999px;line-height:1;box-shadow:0 16px 34px -16px rgba(192,101,58,.7);}
  .mobile-menu .mm-foot{margin-top:34px;font-family:'Vazirmatn',var(--font-body);color:var(--ink-soft);font-size:16px;}
  .float-order{display:none;}
  .order-btn{font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:13px;font-weight:700;color:#fff;background:var(--clay);padding:11px 20px;border-radius:999px;white-space:nowrap;transition:background .25s,transform .25s;}
  .order-btn:hover{background:var(--clay-deep,#a8542e);transform:translateY(-2px);}

  /* ===== article reader ===== */
  .article-shell{padding:clamp(118px,14vw,168px) 0 clamp(64px,9vw,120px);}
  .article-shell .wrap{max-width:760px;}
  .news-back{display:inline-flex;align-items:center;gap:8px;font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:13px;font-weight:700;color:var(--clay);padding-bottom:2px;transition:opacity .2s;}
  .news-back:hover{opacity:.7;}
  .news-article{display:flex;flex-direction:column;text-align:right;}
  .na-meta{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-top:32px;flex-direction:row-reverse;justify-content:flex-end;}
  .nc-chip{font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:11px;font-weight:700;color:#fff;background:var(--clay);padding:5px 12px;border-radius:999px;}
  .nc-date{font-family:'Vazirmatn',var(--font-display);letter-spacing:.02em;font-size:11.5px;font-weight:600;color:var(--sage-deep);}
  .na-title{font-size:clamp(28px,4vw,50px);line-height:1.25;letter-spacing:0;margin-top:18px;}
  .na-cover{margin:clamp(28px,4vw,44px) 0 0;border-radius:6px;overflow:hidden;box-shadow:0 30px 64px -36px rgba(27,25,22,.5);}
  .na-cover img{width:100%;display:block;}
  .na-body{margin-top:clamp(28px,4vw,40px);font-size:18px;line-height:1.95;color:var(--ink-soft);text-align:right;}
  .na-body p{margin:0 0 22px;}
  .na-body p:last-child{margin-bottom:0;}
  .na-body h2{font-size:clamp(24px,3vw,32px);color:var(--ink);margin:40px 0 16px;line-height:1.25;}
  .na-body h3{font-size:clamp(20px,2.4vw,26px);color:var(--ink);margin:34px 0 14px;}
  .na-body a{color:var(--clay);border-bottom:1px solid var(--clay);}
  .na-body img{margin:28px auto;border-radius:6px;}
  .na-body blockquote{margin:30px 0;padding:6px 22px 6px 0;border-right:3px solid var(--clay);font-family:'Vazirmatn',var(--font-serif);font-style:normal;font-size:clamp(20px,2.4vw,25px);line-height:1.6;color:var(--ink);}
  .na-body ul,.na-body ol{margin:0 0 22px;padding-right:1.4em;padding-left:0;}
  .na-body li{margin:0 0 10px;}
  .news-empty{text-align:center;max-width:520px;margin:clamp(20px,5vw,60px) auto;padding:clamp(36px,5vw,60px) 28px;border:1px dashed var(--line);border-radius:10px;background:var(--paper);display:flex;flex-direction:column;align-items:center;gap:18px;}
  .news-empty .ne-text{font-family:'Vazirmatn',var(--font-body);font-weight:500;font-size:clamp(18px,2.2vw,23px);color:var(--ink);}

  /* footer (cloned) */
  footer.site{background:var(--ink);color:var(--cream);padding:clamp(48px,6vw,72px) 0;}
  footer.site .row{display:flex;justify-content:space-between;align-items:center;gap:24px;flex-wrap:wrap;}
  footer.site .brand .name,footer.site .brand .sub{color:var(--cream);}
  footer.site .eyebrow{color:rgba(241,237,228,.6);}
  footer.site a.eyebrow:hover{color:var(--sage);}

  @media (max-width:680px){
    .wrap{padding:0 22px;}
    header.nav{grid-template-columns:1fr;justify-items:start;padding:14px 20px;}
    .nav-left,.nav-right{display:none;}
    .brand{align-items:flex-start;}
    .nav-toggle{display:block;position:absolute;left:20px;top:50%;transform:translateY(-50%);}
    .float-order{display:inline-flex;align-items:center;gap:8px;position:fixed;left:16px;bottom:16px;z-index:55;background:var(--clay);color:#fff;font-family:'Vazirmatn',var(--font-display);font-size:12px;font-weight:700;padding:14px 22px;border-radius:999px;box-shadow:0 14px 30px -10px rgba(192,101,58,.75);transition:transform .25s ease;}
    body.menu-open .float-order{opacity:0;pointer-events:none;}
  }
</style>
</head>

<script>
  const nav=document.getElementById('nav');
  const utilBar=document.getElementById('utilBar');
  const onScroll=()=>{const s=window.scrollY>8;nav.classList.toggle('solid',s);utilBar.classList.toggle('solid',s);};
  window.addEventListener('scroll',onScroll,{passive:true});onScroll();
  const navToggle=document.getElementById('navToggle');const mobileMenu=document.getElementById('mobileMenu');
  function setMenu(open){document.body.classList.toggle('menu-open',open);navToggle.setAttribute('aria-expanded',open?'true':'false');document.body.style.overflow=open?'hidden':'';}
  navToggle.addEventListener('click',()=>setMenu(!document.body.classList.contains('menu-open')));
  mobileMenu.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>setMenu(false)));
  document.addEventListener('keydown',e=>{if(e.key==='Escape')setMenu(false);});

  // Language toggle: switch to the FA/EN reader for the SAME article (preserve slug).
  const langToggle=document.getElementById('langToggle');
  function slugQuery(){const m=/[?&]slug=([^&]+)/.exec(location.search);return m?('?slug='+m[1]):'';}
  langToggle.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{
    const l=b.dataset.lang;const q=slugQuery();
    location.href=(l==='fa'?'/news/fa/article.html':'/news/article.html')+q;
  }));

  function updateStatus(){
    const el=document.getElementById('openStatus');const now=new Date();const h=now.getHours()+now.getMinutes()/60;const open=h>=7&&h<20;
    el.classList.toggle('open',open);el.classList.toggle('closed',!open);
    el.querySelector('.txt').textContent=open?'باز':'بسته';
  }
  updateStatus();setInterval(updateStatus,60000);
</script>
