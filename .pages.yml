media:
  - name: images
    label: Photos
    input: img
    output: img

content:
  - name: events
    label: Events & Calendar
    type: file
    path: events.json
    icon: calendar
    fields:
      - name: events
        label: Events
        type: object
        list: true
        fields:
          - { name: featured, label: "★ Featured? (big event at top)", type: boolean }
          - { name: title, label: Title (English), type: string }
          - { name: title_fa, label: Title (Farsi), type: string }
          - { name: tag, label: "Tag (e.g. Featured Event, Watch Party, Weekly)", type: string }
          - { name: tag_fa, label: Tag (Farsi), type: string }
          - { name: image, label: Photo, type: image }
          - { name: date, label: "Date — one-time event", type: date, options: { format: "yyyy-MM-dd" } }
          - { name: recurDay, label: "OR Weekday 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat (blank for one-time)", type: number }
          - { name: start, label: "Start time (24h, e.g. 10:00)", type: string }
          - { name: end, label: "End time (24h, e.g. 13:00)", type: string }
          - { name: whenLabel, label: "When label (EN, e.g. June 20 · 10AM)", type: string }
          - { name: whenLabel_fa, label: "When label (Farsi)", type: string }
          - { name: locationLabel, label: "Location label (EN)", type: string }
          - { name: locationLabel_fa, label: "Location label (Farsi)", type: string }
          - { name: location, label: "Full address (for Add to Calendar)", type: string }
          - { name: description, label: Description (calendar invite), type: text }
          - { name: archived, label: "Hide from site", type: boolean }
          - { name: id, label: "Unique ID (lowercase)", type: string }

  - name: menu
    label: Menu
    type: file
    path: menu.json
    icon: book-open
    fields:
      - name: boards
        label: Menu Boards
        type: object
        list: true
        fields:
          - { name: title, label: Board title, type: string }
          - { name: image, label: Menu image, type: image }
          - { name: alt, label: "Image description", type: string }
          - { name: id, label: "Unique ID (lowercase)", type: string }

  - name: faq
    label: FAQ
    type: file
    path: faq.json
    icon: help-circle
    fields:
      - name: items
        label: Questions & Answers
        type: object
        list: true
        fields:
          - { name: q, label: Question (English), type: string }
          - { name: q_fa, label: Question (Farsi), type: string }
          - { name: a, label: Answer (English), type: text }
          - { name: a_fa, label: Answer (Farsi), type: text }
          - { name: open, label: "Open by default?", type: boolean }
          - { name: instagram, label: "Instagram link (optional)", type: string }

  - name: shop
    label: Shop
    type: file
    path: shop.json
    icon: shopping-bag
    fields:
      - name: intro
        label: Shop intro
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow (EN), type: string }
          - { name: eyebrow_fa, label: Eyebrow (Farsi), type: string }
          - { name: title, label: Title (EN), type: string }
          - { name: title_fa, label: Title (Farsi), type: string }
          - { name: sub, label: Sub (EN), type: text }
          - { name: sub_fa, label: Sub (Farsi), type: text }
      - { name: purchaseUrl, label: "Default Buy link", type: string }
      - name: sections
        label: Product Sections
        type: object
        list: true
        fields:
          - { name: title, label: Section title (EN), type: string }
          - { name: title_fa, label: Section title (Farsi), type: string }
          - { name: note, label: Section note (EN), type: string }
          - { name: note_fa, label: Section note (Farsi), type: string }
          - { name: id, label: "Section ID (lowercase)", type: string }
          - name: products
            label: Products
            type: object
            list: true
            fields:
              - { name: name, label: Name (EN), type: string }
              - { name: name_fa, label: Name (Farsi), type: string }
              - { name: desc, label: Description (EN), type: text }
              - { name: desc_fa, label: Description (Farsi), type: text }
              - { name: price, label: "Price (e.g. $38)", type: string }
              - { name: image, label: Photo, type: image }
              - { name: badge, label: "Badge (e.g. 1 of a kind)", type: string }
              - { name: purchaseUrl, label: "Buy link (optional)", type: string }
              - { name: id, label: "Product ID (lowercase)", type: string }

  - name: content
    label: General Content
    type: file
    path: content.json
    icon: file-text
    fields:
      - name: about
        label: About page
        type: object
        fields:
          - { name: ledeHtml, label: Intro line (EN), type: text }
          - { name: ledeHtml_fa, label: Intro line (Farsi), type: text }
          - { name: p1, label: Paragraph 1 (EN), type: text }
          - { name: p1_fa, label: Paragraph 1 (Farsi), type: text }
          - { name: p2, label: Paragraph 2 (EN), type: text }
          - { name: p2_fa, label: Paragraph 2 (Farsi), type: text }
          - { name: p3, label: Paragraph 3 (EN), type: text }
          - { name: p3_fa, label: Paragraph 3 (Farsi), type: text }
          - { name: p4, label: Paragraph 4 (EN), type: text }
          - { name: p4_fa, label: Paragraph 4 (Farsi), type: text }
          - { name: p5, label: Paragraph 5 (EN), type: text }
          - { name: p5_fa, label: Paragraph 5 (Farsi), type: text }
          - { name: photoCaption, label: "Rahi & mom caption (EN)", type: string }
          - { name: photoCaption_fa, label: "Rahi & mom caption (Farsi)", type: string }