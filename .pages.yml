The reason it isn't showing is almost certainly that .pages.yml never made it into the repo — macOS Finder hides dot-files, so it gets left out of the zip upload. The fix: paste the config directly into Pages CMS. In Pages CMS go to Settings → Configuration (the editor for .pages.yml), select-all, delete, and paste this in, then Save:

media:
  - name: images
    label: Photos
    input: img
    output: img

content:
  - name: home
    label: Home Page
    type: file
    path: content.json
    icon: home
    fields:
      - name: theme
        label: Fonts
        type: object
        fields:
          - { name: fontDisplay, label: "Display / headlines font", type: select, options: { values: ["Archivo","Anton","Oswald","Bebas Neue","Poppins","Montserrat"] } }
          - { name: fontSerif, label: "Logo / labels font", type: select, options: { values: ["Cinzel","Playfair Display","Cormorant Garamond","EB Garamond"] } }
          - { name: fontBody, label: "Body font", type: select, options: { values: ["Jost","Inter","Work Sans","Nunito Sans","Mulish"] } }
          - { name: fontEditorial, label: "Quotes / editorial font", type: select, options: { values: ["Cormorant Garamond","Playfair Display","Spectral","Newsreader"] } }
      - name: hero
        label: Hero
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow (EN), type: string }
          - { name: eyebrow_fa, label: Eyebrow (Farsi), type: string }
          - { name: titleHtml, label: "Title (EN — <br> allowed)", type: string }
