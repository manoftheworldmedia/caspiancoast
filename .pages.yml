media:
  input: img
  output: img

content:
  - name: events
    label: Events & Calendar
    type: file
    path: events.json
    format: json
    fields:
      - name: featured
        label: Featured Event
        type: object
        fields:
          - { name: id, label: ID, type: string }
          - { name: tag, label: Tag (EN), type: string }
          - { name: tag_fa, label: Tag (FA), type: string }
          - { name: title, label: Title (EN), type: string }
          - { name: title_fa, label: Title (FA), type: string }
          - { name: image, label: Image, type: image }
          - { name: date, label: Date, type: date }
          - { name: start, label: Start Time, type: string }
          - { name: end, label: End Time, type: string }
          - { name: whenLabel, label: When Label (EN), type: string }
          - { name: whenLabel_fa, label: When Label (FA), type: string }
          - { name: locationLabel, label: Location Label (EN), type: string }
          - { name: locationLabel_fa, label: Location Label (FA), type: string }
          - { name: location, label: Full Location (for calendar), type: string }
          - { name: description, label: Description, type: text }
      - name: recurring
        label: Recurring Events
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Title (EN), type: string }
          - { name: title_fa, label: Title (FA), type: string }
          - { name: image, label: Image, type: image }
          - { name: when, label: When (EN), type: string }
          - { name: when_fa, label: When (FA), type: string }
          - { name: recurDay, label: "Day (0=Sun … 6=Sat)", type: number }
          - { name: start, label: Start Time, type: string }
          - { name: end, label: End Time, type: string }
          - { name: location, label: Full Location (for calendar), type: string }
          - { name: description, label: Description, type: text }

  - name: menu
    label: Menu Boards
    type: file
    path: menu.json
    format: json
    fields:
      - name: boards
        label: Menu Boards
        type: object
        list: true
        fields:
          - { name: id, label: ID, type: string }
          - { name: title, label: Title, type: string }
          - { name: image, label: Menu Image, type: image }
          - { name: alt, label: Alt Text (SEO), type: text }

  - name: faq
    label: FAQ
    type: file
    path: faq.json
    format: json
    fields:
      - name: items
        label: Questions
        type: object
        list: true
        fields:
          - { name: q, label: Question (EN), type: string }
          - { name: q_fa, label: Question (FA), type: string }
          - { name: a, label: Answer (EN), type: text }
          - { name: a_fa, label: Answer (FA), type: text }
          - { name: open, label: Open by default, type: boolean }
          - { name: instagram, label: Instagram Link (optional), type: string }

  - name: content
    label: General Content
    type: file
    path: content.json
    format: json
    fields:
      - name: hero
        label: Hero (homepage top)
        type: object
        fields:
          - { name: eyebrow, label: Eyebrow line (EN), type: string }
          - { name: eyebrow_fa, label: Eyebrow line (FA), type: string }
          - { name: titleHtml, label: "Headline (EN — use <br /> for line break)", type: string }
          - { name: titleHtml_fa, label: "Headline (FA — use <br />)", type: string }
          - { name: subHtml, label: Sub-headline (EN), type: text }
          - { name: subHtml_fa, label: Sub-headline (FA), type: text }
      - name: about
        label: About Page — Story
        type: object
        fields:
          - { name: ledeHtml, label: "Lede (EN — <em> allowed)", type: text }
          - { name: ledeHtml_fa, label: Lede (FA), type: text }
          - { name: p1, label: Paragraph 1 (EN), type: text }
          - { name: p1_fa, label: Paragraph 1 (FA), type: text }
          - { name: p2, label: Paragraph 2 (EN), type: text }
          - { name: p2_fa, label: Paragraph 2 (FA), type: text }
          - { name: p3, label: Paragraph 3 (EN), type: text }
          - { name: p3_fa, label: Paragraph 3 (FA), type: text }
          - { name: p4, label: Paragraph 4 (EN), type: text }
          - { name: p4_fa, label: Paragraph 4 (FA), type: text }
          - { name: p5, label: Paragraph 5 (EN), type: text }
          - { name: p5_fa, label: Paragraph 5 (FA), type: text }
      - name: contact
        label: Contact & Hours
        type: object
        fields:
          - { name: addressLine1, label: Address line 1 (EN), type: string }
          - { name: addressLine2, label: Address line 2 (EN), type: string }
          - { name: addressLine1_fa, label: Address line 1 (FA), type: string }
          - { name: addressLine2_fa, label: Address line 2 (FA), type: string }
          - { name: hours, label: Hours (EN), type: string }
          - { name: hours_fa, label: Hours (FA), type: string }
          - { name: phone, label: Phone, type: string, required: false }
          - { name: instagram, label: Instagram URL, type: string }
          - { name: instagramHandle, label: Instagram handle, type: string }
          - { name: mapsUrl, label: Google Maps link, type: string }
          - { name: orderUrl, label: Online ordering link, type: string }
      - name: images
        label: Site Images
        type: object
        fields:
          - name: heroInterior
            label: Hero — Interior
            type: object
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text (EN), type: text }
              - { name: alt_fa, label: Alt text (FA), type: text }
          - name: spiceJars
            label: Spice Jars
            type: object
            fields:
              - { name: src, label: Image, type: image }
              - { name: alt, label: Alt text (EN), type: text }
              - { name: alt_fa, label: Alt text (FA), type: text }
          - name: bakeryBun
